<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}US Mobile Help Center{% endblock %}</title>
    {% block meta %}{% endblock %}
    <link rel="icon" href="https://www.usmobile.com/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f7f8fc; color: #1a1a2e; -webkit-font-smoothing: antialiased; }
        a { color: inherit; text-decoration: none; }

        /* Top bar */
        .topbar {
            background: linear-gradient(135deg, #0a0a23 0%, #161638 100%);
            padding: 14px 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid #4f6ef7; position: sticky; top: 0; z-index: 999;
        }
        .topbar-logo { color: #fff; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        .topbar-logo span { color: #4f6ef7; }
        .topbar-logo a { color: inherit; }
        .topbar-links { display: flex; gap: 20px; }
        .topbar-links a { color: rgba(255,255,255,0.65); font-size: 13px; font-weight: 500; transition: color 0.2s; }
        .topbar-links a:hover { color: #fff; }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #0a0a23 0%, #1a1a3e 50%, #2d1b69 100%);
            padding: 56px 40px 44px; text-align: center; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(79,110,247,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(139,92,246,0.08) 0%, transparent 50%);
        }
        .hero h1 { color: #fff; font-weight: 800; font-size: 38px; margin: 0 0 10px; position: relative; letter-spacing: -1px; }
        .hero p { color: rgba(255,255,255,0.55); font-size: 17px; position: relative; }

        /* Search */
        .search-wrap { max-width: 560px; margin: 24px auto 0; position: relative; }
        .search-wrap input {
            width: 100%; padding: 13px 18px 13px 44px; border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px; background: rgba(255,255,255,0.08); color: #fff;
            font-family: inherit; font-size: 15px; outline: none; transition: all 0.2s;
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
        .search-wrap input:focus { border-color: #4f6ef7; background: rgba(255,255,255,0.12); }
        .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); }

        /* Container */
        .container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }

        /* Pills */
        .pill-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 24px auto 0; max-width: 700px; position: relative; }
        .pill {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            color: #fff; padding: 9px 20px; border-radius: 50px; font-size: 13px; font-weight: 500;
            transition: all 0.2s; display: inline-block;
        }
        .pill:hover { background: rgba(79,110,247,0.3); border-color: rgba(79,110,247,0.5); transform: translateY(-1px); }

        /* Section heading */
        .section-heading {
            font-weight: 700; font-size: 22px; color: #1a1a2e; margin: 36px 0 18px;
            padding-bottom: 10px; border-bottom: 2px solid #e8eaf0;
        }
        .section-heading .count { background: #eef2ff; color: #4f6ef7; padding: 2px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        /* Article cards */
        .article-card {
            background: #fff; border-radius: 14px; padding: 24px 26px;
            border: 1px solid #e8eaf0; transition: all 0.22s ease;
            display: flex; flex-direction: column; height: 100%;
        }
        .article-card:hover { border-color: #4f6ef7; box-shadow: 0 8px 28px rgba(79,110,247,0.10); transform: translateY(-2px); }
        .article-card h3 { font-weight: 600; font-size: 16px; margin: 0 0 8px; line-height: 1.4; }
        .article-card h3 a { color: #1a1a2e; }
        .article-card h3 a:hover { color: #4f6ef7; }
        .article-card .excerpt { font-size: 13.5px; color: #6b7280; line-height: 1.6; flex: 1; margin: 0 0 14px; }
        .article-card .meta { display: flex; align-items: center; gap: 12px; font-size: 11.5px; color: #9ca3af; }
        .badge { background: #eef2ff; color: #4f6ef7; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }

        /* Section cards */
        .section-card {
            background: #fff; border-radius: 16px; padding: 28px;
            border: 1px solid #e8eaf0; transition: all 0.2s; height: 100%;
        }
        .section-card:hover { border-color: #4f6ef7; box-shadow: 0 4px 16px rgba(79,110,247,0.08); }
        .section-card h3 { font-weight: 700; font-size: 18px; margin: 0 0 4px; }
        .section-card h3 a { color: #1a1a2e; }
        .section-card h3 a:hover { color: #4f6ef7; }
        .section-card .sec-count { font-size: 13px; color: #9ca3af; margin: 0 0 16px; }
        .sec-article { padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; color: #374151; display: flex; align-items: center; gap: 8px; }
        .sec-article:last-child { border-bottom: none; }
        .sec-article .dot { color: #4f6ef7; font-size: 8px; }
        .sec-article a { color: #374151; }
        .sec-article a:hover { color: #4f6ef7; }
        .sec-more { color: #4f6ef7; font-weight: 500; }

        /* Category header */
        .category-header {
            background: linear-gradient(135deg, #0a0a23 0%, #1a1a3e 100%);
            padding: 36px 40px; text-align: center; border-bottom: 3px solid #4f6ef7;
        }
        .category-header h2 { color: #fff; font-weight: 700; font-size: 28px; margin: 0 0 6px; }
        .category-header p { color: rgba(255,255,255,0.5); font-size: 14px; }

        /* Article list item */
        .article-list-item {
            background: #fff; border-radius: 12px; padding: 22px;
            border: 1px solid #e8eaf0; margin-bottom: 10px; transition: all 0.2s;
        }
        .article-list-item:hover { border-color: #4f6ef7; box-shadow: 0 4px 12px rgba(79,110,247,0.08); }
        .article-list-item h3 { font-weight: 600; font-size: 16px; margin: 0 0 6px; }
        .article-list-item h3 a { color: #1a1a2e; }
        .article-list-item h3 a:hover { color: #4f6ef7; }
        .article-list-item .snippet { font-size: 13.5px; color: #6b7280; line-height: 1.6; }

        /* Article detail */
        .article-detail {
            background: #fff; border-radius: 18px; padding: 44px 52px;
            border: 1px solid #e8eaf0; margin: 28px auto; max-width: 820px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .article-detail h1 { font-weight: 800; font-size: 30px; margin: 0 0 14px; letter-spacing: -0.5px; line-height: 1.3; }
        .article-meta { display: flex; gap: 16px; color: #9ca3af; font-size: 13px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f5; }
        .article-body { font-size: 15.5px; line-height: 1.8; color: #374151; }
        .article-body h2 { font-size: 21px; color: #1a1a2e; margin: 28px 0 14px; font-weight: 700; }
        .article-body h3 { font-size: 17px; color: #1a1a2e; margin: 22px 0 10px; font-weight: 600; }
        .article-body a { color: #4f6ef7; }
        .article-body img { max-width: 100%; border-radius: 10px; margin: 14px 0; }
        .article-body ul, .article-body ol { padding-left: 22px; }
        .article-body li { margin-bottom: 6px; }
        .article-body code { background: #f3f4f6; padding: 2px 7px; border-radius: 5px; font-size: 13.5px; }
        .article-body blockquote {
            border-left: 3px solid #4f6ef7; padding: 12px 18px; color: #6b7280;
            margin: 16px 0; background: #f8f9ff; border-radius: 0 8px 8px 0; font-size: 14.5px;
        }
        .article-body table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .article-body th, .article-body td { padding: 10px 14px; border: 1px solid #e8eaf0; text-align: left; font-size: 14px; }
        .article-body th { background: #f8f9fc; font-weight: 600; }
        .article-labels { margin-top: 20px; display: flex; gap: 6px; flex-wrap: wrap; }
        .vote-section { text-align: center; padding: 28px; margin: 28px 0 0; border-top: 1px solid #f0f0f5; }
        .vote-section p { font-size: 14px; color: #6b7280; margin: 0 0 10px; }

        /* Breadcrumb */
        .breadcrumb { font-size: 13px; color: #9ca3af; margin: 20px auto 0; max-width: 820px; }
        .breadcrumb a { color: #4f6ef7; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* Back link */
        .back-link { display: inline-flex; align-items: center; gap: 4px; color: #4f6ef7; font-size: 14px; font-weight: 500; margin: 16px 0; }
        .back-link:hover { text-decoration: underline; }

        /* Empty state */
        .empty-state { text-align: center; padding: 60px 40px; }
        .empty-state h3 { font-weight: 600; font-size: 18px; margin: 12px 0 6px; }
        .empty-state p { font-size: 14px; color: #9ca3af; }

        /* Footer */
        .footer {
            text-align: center; padding: 36px; margin-top: 50px;
            background: #0a0a23; color: rgba(255,255,255,0.35); font-size: 12.5px;
        }
        .footer a { color: rgba(255,255,255,0.45); }

        /* Related grid */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; max-width: 820px; margin: 0 auto; }
        @media (max-width: 768px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }

        /* Search results count */
        .results-count { color: #6b7280; font-size: 14px; margin: 6px 0 16px; }

        /* Search bar in section/search header */
        .header-search { max-width: 500px; margin: 16px auto 0; position: relative; }
        .header-search input {
            width: 100%; padding: 11px 16px; border: 2px solid #e8eaf0;
            border-radius: 10px; font-family: inherit; font-size: 14.5px; outline: none;
            transition: border-color 0.2s;
        }
        .header-search input:focus { border-color: #4f6ef7; box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }
    </style>
</head>
<body>
    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-logo"><a href="/">US Mobile <span>Help Center</span></a></div>
        <div class="topbar-links">
            <a href="https://www.usmobile.com" target="_blank">US Mobile</a>
            <a href="https://www.usmobile.com/community" target="_blank">Community</a>
            <a href="https://www.usmobile.com/contact" target="_blank">Contact Us</a>
        </div>
    </div>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2026 US Mobile Inc. All rights reserved.</p>
        <p style="margin-top:6px;">
            <a href="https://www.usmobile.com">usmobile.com</a> &middot;
            <a href="https://www.usmobile.com/privacy">Privacy</a> &middot;
            <a href="https://www.usmobile.com/terms">Terms</a>
        </p>
    </div>
</body>
</html>
